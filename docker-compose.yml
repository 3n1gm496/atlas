version: '3.9'
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: atlas
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: atlas
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
  app:
    build: .
    command: npm run dev
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://atlas:atlas@db:5432/atlas
    depends_on:
      - db
volumes:
  pgdata:
